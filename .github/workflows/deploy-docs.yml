name: Deploy design system docs

# Publishes the static /design-system documentation to GitHub Pages
# (https://dnbl0.github.io/bp/design-system/) on every push to main.
#
# One-time setup: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

on:
    push:
        branches: [main]
        paths:
            - 'pages/design-system/**'
            - 'styleguide-components/**'
            - 'components/**'
            - 'styles/**'
            - 'public/**'
            - 'utils/**'
            - 'tailwind.config.js'
            - 'next.config.js'
            - 'scripts/build-docs.sh'
            - '.github/workflows/deploy-docs.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            DOCS_EXPORT: '1'
            DOCS_BASE_PATH: /bp
            # Dummy values so the Apollo client can construct at build time.
            # The docs never query Contentful.
            NEXT_PUBLIC_CONTENTFUL_SPACE_ID: dummy
            NEXT_PUBLIC_CONTENTFUL_ENVIRONMENT: master
            NEXT_PUBLIC_CONTENT_DELIVERY_ACCESS_TOKEN: dummy
            NEXT_PUBLIC_CONTENT_PREVIEW_ACCESS_TOKEN: dummy
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: yarn
            - run: yarn install --frozen-lockfile
            - name: Build static docs
              run: bash scripts/build-docs.sh
            - uses: actions/configure-pages@v4
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: out

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
